<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifhVault</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg"></div>

  <!-- VAULT ENTRY SCREEN -->
  <div id="entryScreen" class="center">
    <div class="vault-box">
      <h1 class="title">LIFHVAULT</h1>
      <p class="subtitle">Open the vault and dominate</p>

      <div class="wheel-container">
        <div class="wheel" id="wheel"></div>
      </div>

      <button onclick="enterVault()" class="enter-btn">
        UNLOCK VAULT
      </button>
    </div>
  </div>

  <!-- MAIN SITE -->
  <div id="mainSite" class="hidden">
    <header>
      <h1>LIFHVAULT</h1>
      <p class="glow">Elite Script Marketplace</p>
    </header>

    <section class="panel">
      <h2>Access Panel</h2>
      <p>Open a ticket in Discord to purchase access to all of my configs and future updates to the configs.</p>

      <iframe 
        src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"
        width="100%"
        height="400"
        allowtransparency="true"
        frameborder="0">
      </iframe>

      <a class="buy-btn" href="https://discord.gg/8ffj6BeHmC" target="_blank">
        JOIN DISCORD
      </a>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
